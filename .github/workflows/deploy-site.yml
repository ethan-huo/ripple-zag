name: Deploy Site

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/deploy-site.yml
      - bun.lock
      - package.json
      - packages/zag-ripple/**
      - site/**

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-site-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: 1.3.14
  CLOUDFLARE_ACCOUNT_ID: 929e895c7aaff5f545db857d25dffda2
  CLOUDFLARE_PROJECT_NAME: zag-ripple

jobs:
  deploy:
    name: Build and deploy Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test package
        run: bun --filter zag-ripple test -- --run

      - name: Build site
        run: bun --filter ./site build

      - name: Ensure Cloudflare Pages project
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail

          node <<'NODE'
          const accountId = process.env.CLOUDFLARE_ACCOUNT_ID
          const projectName = process.env.CLOUDFLARE_PROJECT_NAME
          const apiToken = process.env.CLOUDFLARE_API_TOKEN

          if (!apiToken) {
            throw new Error("Missing CLOUDFLARE_API_TOKEN repository secret")
          }

          const baseUrl = `https://api.cloudflare.com/client/v4/accounts/${accountId}/pages/projects`
          const headers = {
            Authorization: `Bearer ${apiToken}`,
            "Content-Type": "application/json",
          }

          async function readJson(response) {
            const text = await response.text()
            return text ? JSON.parse(text) : {}
          }

          const existing = await fetch(`${baseUrl}/${projectName}`, { headers })
          if (existing.ok) {
            console.log(`Cloudflare Pages project already exists: ${projectName}`)
            process.exit(0)
          }

          if (existing.status !== 404) {
            const payload = await readJson(existing)
            throw new Error(`Failed to check Cloudflare Pages project: ${existing.status} ${JSON.stringify(payload.errors ?? payload)}`)
          }

          const created = await fetch(baseUrl, {
            method: "POST",
            headers,
            body: JSON.stringify({
              name: projectName,
              production_branch: "main",
            }),
          })

          const payload = await readJson(created)
          if (!created.ok || payload.success === false) {
            throw new Error(`Failed to create Cloudflare Pages project: ${created.status} ${JSON.stringify(payload.errors ?? payload)}`)
          }

          console.log(`Created Cloudflare Pages project: ${projectName}`)
          NODE

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site/dist --project-name=${{ env.CLOUDFLARE_PROJECT_NAME }} --branch=${{ github.ref_name }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
